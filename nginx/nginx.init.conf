# ============================================================
# 初回証明書取得用 Nginx 設定（HTTP のみ）
# 使い方: cp nginx/nginx.init.conf nginx/nginx.conf
# 証明書取得後は nginx/nginx.prod.conf に切り替えること
# ============================================================

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt の ACME チャレンジ用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Initializing SSL...';
        add_header Content-Type text/plain;
    }
}
