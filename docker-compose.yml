name: yourls
services:
  db:
    image: mysql:8.0
    # NOTE: use of "mysql_native_password" is not recommended: https://dev.mysql.com/doc/refman/8.0/en/upgrading-from-previous-series.html#upgrade-caching-sha2-password
    # (this is just an example, not intended to be a production configuration)
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./volumes/mysql:/var/lib/mysql

  yourls:
    image: yourls
    depends_on:
      - db
    expose:
      - ${YOURLS_INTERNAL_PORT}
    environment:
      - YOURLS_SITE=${YOURLS_SITE}
      - YOURLS_USER=${YOURLS_USER}
      - YOURLS_PASS=${YOURLS_PASS}
      - YOURLS_DB_HOST=db
      - YOURLS_DB_NAME=${MYSQL_DATABASE}
      - YOURLS_DB_USER=${MYSQL_USER}
      - YOURLS_DB_PASS=${MYSQL_PASSWORD}
      - YOURLS_LANG=${YOURLS_LANG}
      - YOURLS_HOURS_OFFSET=${YOURLS_HOURS_OFFSET}
    volumes:
      - ./config/config.php:/var/www/html/user/config.php
      - ./config/languages/ja_JP.mo:/var/www/html/user/languages/ja_JP.mo
      - ./config/plugins:/var/www/html/user/plugins
  nginx:
    image: nginx:alpine
    depends_on:
      - yourls
    ports:
      - "${YOURLS_EXTERNAL_PORT}:80"
      - "${YOURLS_EXTERNAL_SSLPORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/webroot:/var/www/certbot
      - ./volumes/letsencrypt:/etc/letsencrypt:ro
    restart: always

  certbot:
    image: certbot/dns-cloudflare
    volumes:
      - ./volumes/letsencrypt:/etc/letsencrypt
      - ./volumes/cloudflare.ini:/etc/cloudflare.ini:ro
    # 12時間ごとに証明書の更新を試みる
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
